name: GAG2 Predictor Auto Run

on:
  schedule:
    # Jalan tiap 5 menit, samain sama siklus restock GAG2
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # bisa di-trigger manual dari tab Actions

jobs:
  run-predictor:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run predictor
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python gag2_predictor.py
